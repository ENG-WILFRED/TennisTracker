name: vico
description: "VICO - Tennis Tracker Platform Flutter App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  
  # Networking
  http: ^1.1.0
  dio: ^5.3.1
  web_socket_channel: ^2.4.0
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Authentication
  flutter_secure_storage: ^9.0.0
  
  # UI Components
  cupertino_icons: ^1.0.2
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^1.1.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  intl: ^0.19.0
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.2
  geocoding: ^2.1.0
  
  # Payments
  stripe_flutter: ^6.0.0
  
  # Real-time
  socket_io_client: ^2.0.1
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # Logging
  logger: ^2.0.1
  
  # Date & Time
  table_calendar: ^3.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
  
  fonts:
    - family: Bebas Neue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf
